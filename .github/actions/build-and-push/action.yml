name: Build and Push Image
description: Build one llmster image variant and push to both registries

inputs:
  version:
    description: Upstream version string (e.g. 0.0.12-1)
    required: true
  tag-prefix:
    description: Tag prefix — empty string for canonical, "gateway-" for gateway
    required: true
  build-args:
    description: Docker build-arg string (e.g. LLMSTER_GATEWAY_ONLY=1)
    required: false
    default: ''
  push:
    description: Whether to push — "true" or "false"
    required: true
  ghcr-token:
    description: GitHub token for ghcr.io
    required: true
  forgejo-token:
    description: Forgejo registry token
    required: true

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

    - name: Login to ghcr.io
      if: inputs.push == 'true'
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.ghcr-token }}

    - name: Login to Forgejo registry
      if: inputs.push == 'true'
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
      with:
        registry: forgejo.treyturner.info
        username: ${{ github.repository_owner }}
        password: ${{ inputs.forgejo-token }}

    - name: Build and push
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
      with:
        context: .
        build-args: ${{ inputs.build-args }}
        push: ${{ inputs.push == 'true' }}
        tags: |
          ghcr.io/${{ github.repository_owner }}/llmster:${{ inputs.tag-prefix }}${{ inputs.version }}
          ghcr.io/${{ github.repository_owner }}/llmster:${{ inputs.tag-prefix }}latest
          forgejo.treyturner.info/${{ github.repository_owner }}/llmster:${{ inputs.tag-prefix }}${{ inputs.version }}
          forgejo.treyturner.info/${{ github.repository_owner }}/llmster:${{ inputs.tag-prefix }}latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
